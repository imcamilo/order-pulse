[platformio]
; Only build the firmware env on `pio run`. The native env is for tests
; and is invoked explicitly with `pio test -e native`.
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; Serial monitor speed (avoid garbage output)
monitor_speed = 115200

; More conservative upload speed to avoid checksum errors
upload_speed = 460800

; Libraries
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.11.0
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.0.0

; Critical flags for ESP32-S3 (enable native USB Serial)
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; Native env for unit tests on the host machine (no hardware needed)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -std=gnu++17
; Only compile pure-logic sources for native tests.
build_src_filter = -<*> +<StatusLogic.cpp> +<PayloadParser.cpp>
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0