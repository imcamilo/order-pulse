; PlatformIO Project Configuration File
; CYD - ESP32-2432S028 (Cheap Yellow Display) — Control Panel

[platformio]
; Only build the firmware env on `pio run`. The native env is for tests
; and is invoked explicitly with `pio test -e native`.
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed = 460800

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.0
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

build_flags =
    -std=gnu++17
    ; --- TFT_eSPI ---
    -DUSER_SETUP_LOADED=1
    -DILI9341_DRIVER
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSPI_FREQUENCY=55000000

; Native env for unit tests on the host machine (no hardware needed)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -std=gnu++17
; Only compile pure-logic sources for native tests.
build_src_filter = -<*> +<TouchLogic.cpp>
